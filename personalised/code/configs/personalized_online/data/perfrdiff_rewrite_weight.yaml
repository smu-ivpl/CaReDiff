data_name: react_2025
_target_: dataset.perfrdiff_rewrite_weight.PerFRDiffRewriteWeightDataModule

train_dataset:
    _target_: dataset.perfrdiff_rewrite_weight.PerFRDiffRewriteWeightDataset
    batch_size: ${trainer.batch_size}
    shuffle: True
    num_workers: 8
    root_dir: ${data_dir}
    split: train
    clip_length: 750
    target_size: 224
    crop_size: 224
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: False
    load_video_l: False
    load_audio: True
    load_emotion_s: True
    load_emotion_l: True
    load_3dmm_s: True
    load_3dmm_l: True
    load_ref: True
    load_personality_l: True
    personal_condition_mode: ${trainer.main_model.args.personal_condition_mode}
    load_eeg_l: ${trainer.generic.train_eeg}
    eeg_dir_name: eeg_processed
    eeg_target_cols:
        - TP9
        - AF7
        - AF8
        - TP10
        - Delta_TP9
        - Theta_TP9
        - Alpha_TP9
        - Beta_TP9
        - Gamma_TP9
        - Delta_TP10
        - Theta_TP10
        - Alpha_TP10
        - Beta_TP10
        - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: True
    bidirectional: ${trainer.generic.bidirectional}
    normalize_3dmm: standard

validation_dataset:
    _target_: dataset.perfrdiff_rewrite_weight.PerFRDiffRewriteWeightDataset
    batch_size: ${trainer.batch_size}
    shuffle: False
    num_workers: 8
    root_dir: ${data_dir}
    split: val
    clip_length: 750
    target_size: 224
    crop_size: 224
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: False
    load_video_l: False
    load_audio: True
    load_emotion_s: True
    load_emotion_l: True
    load_3dmm_s: True
    load_3dmm_l: True
    load_ref: True
    load_personality_l: True
    personal_condition_mode: ${trainer.main_model.args.personal_condition_mode}
    load_eeg_l: ${trainer.generic.train_eeg}
    eeg_dir_name: eeg_processed
    eeg_target_cols:
        - TP9
        - AF7
        - AF8
        - TP10
        - Delta_TP9
        - Theta_TP9
        - Alpha_TP9
        - Beta_TP9
        - Gamma_TP9
        - Delta_TP10
        - Theta_TP10
        - Alpha_TP10
        - Beta_TP10
        - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: True
    bidirectional: ${trainer.generic.bidirectional}
    normalize_3dmm: standard

test_dataset:
    _target_: dataset.perfrdiff_rewrite_weight.PerFRDiffRewriteWeightDataset
    batch_size: ${trainer.batch_size}
    shuffle: False
    num_workers: 4
    root_dir: ${data_dir}
    split: test
    clip_length: 750
    target_size: 224
    crop_size: 224
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: False
    load_video_l: False
    load_audio: True
    load_emotion_s: True
    load_emotion_l: True
    load_3dmm_s: True
    load_3dmm_l: True
    load_ref: False
    load_personality_l: True
    personal_condition_mode: ${trainer.main_model.args.personal_condition_mode}
    load_eeg_l: ${trainer.generic.eval_eeg}
    eeg_dir_name: eeg_processed
    eeg_target_cols:
        - TP9
        - AF7
        - AF8
        - TP10
        - Delta_TP9
        - Theta_TP9
        - Alpha_TP9
        - Beta_TP9
        - Gamma_TP9
        - Delta_TP10
        - Theta_TP10
        - Alpha_TP10
        - Beta_TP10
        - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: True
    bidirectional: ${trainer.generic.bidirectional}
    normalize_3dmm: standard
    num_test_gts: ${num_gts}
